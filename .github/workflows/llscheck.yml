name: llscheck
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  push:
    branches:
      - main
jobs:
  llscheck:
    runs-on: ubuntu-latest
    name: llscheck
    steps:
      - uses: actions/checkout@master
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - uses: luarocks/gh-actions-lua@v11
        with:
          luaVersion: "luajit-openresty"
      - name: Install lua-language-server
        uses: jdx/mise-action@v2
        with:
          tool_versions: |
            lua-language-server latest
      - uses: luarocks/gh-actions-luarocks@v6
      - name: Install llscheck
        run: |
          luarocks install llscheck
          luarocks install nlua
      - name: Clone dependencies - busted
        uses: actions/checkout@v4
        with:
          repository: "LuaCATS/busted"
          path: ".dependencies/busted"
      - name: Clone dependencies - luassert
        uses: actions/checkout@v4
        with:
          repository: "LuaCATS/luassert"
          path: ".dependencies/luassert"
      - name: Clone dependencies - luavit-meta
        uses: actions/checkout@v4
        with:
          repository: "Bilal2453/luvit-meta"
          path: ".dependencies/luvit-meta"
      - name: Clone dependencies - snack.nvim
        uses: actions/checkout@v4
        with:
          repository: "folke/snacks.nvim"
          path: ".dependencies/snacks.nvim"
      - name: Clone dependencies - mini.nvim
        uses: actions/checkout@v4
        with:
          repository: "nvim-mini/mini.nvim"
          path: ".dependencies/mini.nvim"
      - name: Clone dependencies - telescope.nvim
        uses: actions/checkout@v4
        with:
          repository: "nvim-telescope/telescope.nvim"
          path: ".dependencies/telescope.nvim"
      - name: Print Version
        run: |
          lua-language-server --version
      - name: llscheck
        run: |
          VIMRUNTIME=`nlua -e 'io.write(os.getenv("VIMRUNTIME"))'` llscheck --configpath .github/workflows/.luarc.json .
